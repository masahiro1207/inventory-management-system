<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>棚卸し表 - 在庫管理システム</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary-color: #00d4ff;
        --secondary-color: #0099cc;
        --accent-color: #ff6b35;
        --success-color: #00ff88;
        --warning-color: #ffaa00;
        --danger-color: #ff4757;
        --dark-bg: #0a0a0a;
        --dark-card: #1a1a1a;
        --dark-surface: #2a2a2a;
        --text-primary: #ffffff;
        --text-secondary: #b0b0b0;
        --text-muted: #808080;
        --border-color: #333333;
      }

      body {
        background: linear-gradient(
          135deg,
          #0a0a0a 0%,
          #1a1a1a 50%,
          #0a0a0a 100%
        );
        min-height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--text-primary);
      }

      .navbar {
        background: rgba(26, 26, 26, 0.95) !important;
        backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border-color);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      }

      .navbar-brand {
        font-weight: 700;
        font-size: 1.5rem;
        background: linear-gradient(
          135deg,
          var(--primary-color),
          var(--accent-color)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .main-container {
        background: rgba(26, 26, 26, 0.95);
        backdrop-filter: blur(20px);
        border-radius: 20px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        margin: 2rem auto;
        padding: 2rem;
        max-width: 1600px;
        border: 1px solid var(--border-color);
      }

      .table {
        background: var(--dark-card);
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        border: 1px solid var(--border-color);
      }

      .table thead th {
        background: linear-gradient(
          135deg,
          var(--dark-surface),
          var(--dark-card)
        );
        color: var(--text-primary);
        border: none;
        padding: 0.75rem;
        font-weight: 600;
        border-bottom: 2px solid var(--primary-color);
        font-size: 0.9rem;
        white-space: nowrap;
      }

      .table tbody td {
        color: var(--text-primary);
        border-color: var(--border-color);
        padding: 0.6rem;
        font-size: 0.9rem;
        vertical-align: middle;
      }

      .table tbody tr:hover {
        background-color: rgba(0, 212, 255, 0.08);
      }

      .btn {
        border-radius: 10px;
        font-weight: 600;
        padding: 0.75rem 1.5rem;
        transition: all 0.3s ease;
        border: none;
      }

      .btn-primary {
        background: linear-gradient(
          135deg,
          var(--primary-color),
          var(--secondary-color)
        );
        color: var(--dark-bg);
      }

      .btn-outline-light {
        border: 2px solid var(--primary-color);
        color: var(--primary-color);
        background: transparent;
      }

      .btn-outline-light:hover {
        background: var(--primary-color);
        color: var(--dark-bg);
      }

      .form-control,
      .form-select {
        background: var(--dark-card);
        border: 2px solid var(--border-color);
        border-radius: 10px;
        padding: 0.5rem 1rem;
        color: var(--text-primary);
      }

      .form-control:focus,
      .form-select:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        background: var(--dark-card);
        color: var(--text-primary);
      }

      .page-title {
        font-weight: 700;
        margin-bottom: 1.5rem;
        padding-bottom: 0.75rem;
        border-bottom: 2px solid var(--primary-color);
      }

      .summary-row {
        font-weight: 600;
        background: rgba(0, 212, 255, 0.15) !important;
      }

      .loading-spinner {
        display: inline-block;
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: var(--primary-color);
        animation: spin 0.8s linear infinite;
        vertical-align: middle;
        margin-right: 0.5rem;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media print {
        body {
          background: #fff;
          color: #000;
        }
        .navbar,
        .no-print,
        .btn {
          display: none !important;
        }
        .main-container {
          box-shadow: none;
          border: 1px solid #ddd;
          background: #fff;
          color: #000;
        }
        .table {
          background: #fff;
        }
        .table thead th {
          background: #f0f0f0 !important;
          color: #000 !important;
        }
        .table tbody td {
          color: #000 !important;
        }
        .table tbody tr:hover {
          background: transparent !important;
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container">
        <a class="navbar-brand" href="/">
          <i class="fas fa-boxes me-2"></i
          ><span class="d-none d-sm-inline">在庫管理システム</span
          ><span class="d-inline d-sm-none">在庫管理</span>
        </a>
        <div class="collapse navbar-collapse" id="navbarNav">
          <div class="navbar-nav ms-auto">
            <a href="/" class="btn btn-outline-light me-2 mb-2 mb-lg-0">
              <i class="fas fa-list me-1"></i
              ><span class="d-none d-md-inline">在庫一覧</span>
            </a>
            <a
              href="/inventory-count"
              class="btn btn-primary me-2 mb-2 mb-lg-0"
            >
              <i class="fas fa-clipboard-list me-1"></i
              ><span class="d-none d-md-inline">棚卸し表</span>
            </a>
            <a href="/alerts" class="btn btn-outline-light me-2 mb-2 mb-lg-0">
              <i class="fas fa-exclamation-triangle me-1"></i
              ><span class="d-none d-md-inline">アラート</span>
            </a>
            <a href="/settings" class="btn btn-outline-light mb-2 mb-lg-0">
              <i class="fas fa-cog me-1"></i
              ><span class="d-none d-md-inline">設定</span>
            </a>
          </div>
        </div>
      </div>
    </nav>

    <div class="main-container">
      <h2 class="page-title">
        <i class="fas fa-clipboard-list me-2"></i>棚卸し表（現在の在庫状況一覧）
      </h2>

      <div class="row mb-4 no-print">
        <div class="col-md-4">
          <label class="form-label text-light">取引会社で絞り込み</label>
          <select
            class="form-select"
            id="dealerFilter"
            onchange="loadInventoryCount()"
          >
            <option value="">全て</option>
          </select>
        </div>
        <div class="col-md-4 d-flex align-items-end gap-2">
          <button
            type="button"
            class="btn btn-outline-light"
            onclick="window.print()"
          >
            <i class="fas fa-print me-1"></i>印刷
          </button>
          <button
            type="button"
            class="btn btn-primary"
            id="pdfExportBtn"
            onclick="exportCountPDF()"
          >
            <i class="fas fa-file-pdf me-1"></i>PDF出力
          </button>
        </div>
      </div>

      <div class="table-responsive">
        <table class="table table-dark table-hover" id="inventoryCountTable">
          <thead>
            <tr>
              <th>No.</th>
              <th>カテゴリ</th>
              <th>商品名</th>
              <th class="text-end">金額（円）</th>
              <th class="text-end">数量</th>
              <th class="text-end">合計金額（円）</th>
            </tr>
          </thead>
          <tbody id="countTableBody">
            <tr>
              <td colspan="6" class="text-center text-muted py-5">
                <span class="loading-spinner"></span> 読み込み中...
              </td>
            </tr>
          </tbody>
          <tfoot id="countTableFoot"></tfoot>
        </table>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      let products = [];

      async function loadDealers() {
        try {
          const res = await fetch("/api/dealers");
          const data = await res.json();
          if (data.success && data.dealers && data.dealers.length) {
            const sel = document.getElementById("dealerFilter");
            data.dealers.forEach((d) => {
              const opt = document.createElement("option");
              opt.value = d;
              opt.textContent = d;
              sel.appendChild(opt);
            });
          }
        } catch (e) {
          console.warn("取引会社一覧の取得に失敗しました", e);
        }
      }

      function formatNum(n) {
        return Number(n).toLocaleString();
      }

      async function loadInventoryCount() {
        const dealer = document.getElementById("dealerFilter").value;
        let url = "/api/products?sort_by=product_name&sort_order=asc";
        if (dealer) url += "&dealer=" + encodeURIComponent(dealer);

        const tbody = document.getElementById("countTableBody");
        tbody.innerHTML =
          '<tr><td colspan="6" class="text-center text-muted py-5">読み込み中...</td></tr>';

        try {
          const res = await fetch(url);
          products = await res.json();
          if (!Array.isArray(products)) {
            tbody.innerHTML =
              '<tr><td colspan="6" class="text-center text-danger">データの取得に失敗しました</td></tr>';
            document.getElementById("countTableFoot").innerHTML = "";
            return;
          }

          let totalAmount = 0;
          tbody.innerHTML = products
            .map((p, i) => {
              const amount = (p.unit_price || 0) * (p.current_stock || 0);
              totalAmount += amount;
              return (
                "<tr>" +
                "<td>" +
                (i + 1) +
                "</td>" +
                "<td>" +
                (p.category || "-") +
                "</td>" +
                "<td>" +
                (p.product_name || "-") +
                "</td>" +
                '<td class="text-end">' +
                formatNum(p.unit_price) +
                "</td>" +
                '<td class="text-end">' +
                formatNum(p.current_stock) +
                "</td>" +
                '<td class="text-end">' +
                formatNum(amount) +
                "</td>" +
                "</tr>"
              );
            })
            .join("");

          const foot = document.getElementById("countTableFoot");
          foot.innerHTML =
            '<tr class="summary-row">' +
            '<td colspan="4" class="text-end">合計金額</td>' +
            '<td class="text-end">' +
            formatNum(
              products.reduce((s, p) => s + (p.current_stock || 0), 0),
            ) +
            "</td>" +
            '<td class="text-end">' +
            formatNum(totalAmount) +
            " 円</td>" +
            "</tr>";
        } catch (e) {
          tbody.innerHTML =
            '<tr><td colspan="6" class="text-center text-danger">読み込みエラー: ' +
            (e.message || "不明") +
            "</td></tr>";
          document.getElementById("countTableFoot").innerHTML = "";
        }
      }

      function exportCountPDF() {
        const dealer = document.getElementById("dealerFilter").value;
        let url = "/api/pdf/inventory-count?";
        if (dealer) url += "dealer=" + encodeURIComponent(dealer);
        const btn = document.getElementById("pdfExportBtn");
        const origHtml = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML =
          '<span class="loading-spinner me-2"></span>PDF出力中...';
        fetch(url)
          .then((res) => {
            if (!res.ok)
              return res
                .json()
                .then((d) => Promise.reject(d.error || "エラー"));
            return res.blob();
          })
          .then((blob) => {
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download =
              "棚卸し表" +
              (dealer ? "_" + dealer : "") +
              "_" +
              new Date().toISOString().slice(0, 10) +
              ".pdf";
            a.click();
            URL.revokeObjectURL(a.href);
          })
          .catch((err) =>
            alert(
              "PDF出力に失敗しました: " +
                (typeof err === "string" ? err : "不明なエラー"),
            ),
          )
          .finally(() => {
            btn.disabled = false;
            btn.innerHTML = origHtml;
          });
      }

      document.addEventListener("DOMContentLoaded", function () {
        loadDealers();
        loadInventoryCount();
      });
    </script>
  </body>
</html>
